<!doctype html>
<meta charset="utf-8">
<script>
var kirieProbeName = new URLSearchParams(globalThis.location.search).get("probe") || "res_asset_loading";

function postToGodot(message) {
	var messageJson = JSON.stringify(message);
	if (globalThis.KirieAndroidBridge) {
		globalThis.KirieAndroidBridge.postMessage(messageJson);
		return;
	}

	var iosBridge = globalThis.webkit && globalThis.webkit.messageHandlers && globalThis.webkit.messageHandlers.kirie;
	if (iosBridge) {
		iosBridge.postMessage(messageJson);
		return;
	}

	throw new Error("Kirie native IPC bridge is not available.");
}

globalThis.addEventListener("kirie:ipc-message", function(event) {
	var message = event.detail;
	if (message && message.type === "godot_ready") {
		postToGodot({
			type: "web_ack",
			payload: {
				probe: kirieProbeName,
				acknowledgedType: message.type,
			},
		});
	}
});

postToGodot({
	type: "web_ready",
	payload: {
		probe: kirieProbeName,
		href: globalThis.location.href,
		userAgent: navigator.userAgent,
	},
});
</script>
