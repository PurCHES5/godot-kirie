<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kirie Basic IPC</title>
</head>

<body>
  <div id="app">
    <section class="card">
      <h1>Kirie Basic IPC</h1>
      <p>
        This page sends a <code>web_ready</code> message on load and listens for
        <code>kirie:ipc-message</code> events dispatched by the native bridge.
      </p>
      <div class="row">
        <button id="sendButton" type="button">Send web_ping</button>
      </div>
      <pre id="log">Page booting...</pre>
    </section>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
